name: ZAP Security Scan (Scheduled)

# Scans the live beta deployment weekly.
# Requires the ZAP_TARGET_URL repository variable to be set in GitHub:
#   Settings → Secrets and variables → Actions → Variables → ZAP_TARGET_URL
#   Value: https://ai-beta.plexorcist.synology.me (or current beta URL)
#
# Accepted findings are suppressed via .zap/rules.tsv.
# New unexpected findings will fail the workflow and appear in the Actions summary.

on:
  schedule:
    - cron: '0 3 * * 1'  # Weekly, Monday 03:00 UTC
  workflow_dispatch:      # Allow manual trigger from Actions tab

permissions:
  contents: read

jobs:
  zap-baseline:
    name: DAST — ZAP Baseline Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ vars.ZAP_TARGET_URL }}
          rules_file_name: '.zap/rules.tsv'
          fail_action: true
          allow_issue_writing: false
          artifact_name: zap-baseline-${{ github.run_number }}
          cmd_options: >-
            -z "-config spider.excludeList=.*\/api\/chat.*,.*\/api\/realtime\/.*,.*\/api\/voice\/.*,.*\/api\/report-issue.*,.*\/api\/mcp.*,.*\/api\/plex\/.*,.*\/api\/tmdb\/.*,.*\/api\/services\/.*,.*\/api\/setup\/.*,.*\/api\/settings\/langfuse.*,.*\/api\/internal.*"
