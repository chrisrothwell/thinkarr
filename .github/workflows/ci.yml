name: CI

on:
  pull_request:
    branches:
      - dev
      - main
    paths-ignore:
      - '**.md'
      - '**.MD'
      - '.claude/**'
      - 'docker-compose.yml'
      - 'LICENSE'

jobs:
  test:
    name: Lint, Type-check & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: SAST scan
        # continue-on-error while we establish a clean baseline; remove once
        # all existing findings are resolved and the scan is known-green.
        continue-on-error: true
        run: npx semgrep@latest --config=p/typescript --config=p/nextjs --config=p/owasp-top-ten src/ --error

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_VERSION: pr-${{ github.event.pull_request.number }}

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: true
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-pr-${{ github.event.pull_request.number }}
          path: playwright-report/
          retention-days: 7
