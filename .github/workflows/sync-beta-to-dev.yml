name: Sync beta → dev

# Every time a PR is merged into beta, beta gains a merge commit that dev
# doesn't have. The next dev→beta PR then shows as "BEHIND", requiring a
# manual sync PR before it can be merged. This workflow opens that sync PR
# automatically so it's ready to merge before the next release cycle.

on:
  push:
    branches:
      - beta

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if dev is already up to date with beta
        id: check
        run: |
          git fetch origin dev beta
          BEHIND=$(git log origin/dev..origin/beta --oneline | wc -l | tr -d ' ')
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"

      - name: Open sync PR if dev is behind beta
        if: steps.check.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto/sync-beta-to-dev-$(date +%Y%m%d%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH" origin/dev
          git merge origin/beta --no-edit -m "chore: sync beta merge commit into dev (automated)"
          git push origin "$BRANCH"
          gh pr create \
            --base dev \
            --head "$BRANCH" \
            --title "chore: sync beta → dev (automated)" \
            --body "Beta has new merge commits that dev does not include, which would cause the next dev→beta PR to show as BEHIND. This PR merges them in. No file conflicts — auto-generated by the sync-beta-to-dev workflow."
