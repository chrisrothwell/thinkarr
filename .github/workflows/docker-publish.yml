name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
    branches:
      - beta

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Strip leading 'v' from tag names so APP_VERSION is always a bare
      # version string (e.g. '1.1.0' not 'v1.1.0', 'beta' stays 'beta').
      - name: Set version
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_VERSION: ${{ env.APP_VERSION }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: true
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker-e2e:
    name: Docker E2E Tests
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Docker image
        run: docker build -t thinkarr:ci-test .

      - name: E2E tests against Docker container
        run: npm run test:e2e:docker
        env:
          CI: true
          NEXT_TELEMETRY_DISABLED: "1"
          E2E_DOCKER_IMAGE: thinkarr:ci-test

      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: thinkarr:ci-test
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-docker
          path: playwright-report/
          retention-days: 7

  docker:
    name: Build & Push Docker Image
    needs: docker-e2e
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: chrisrothwell/thinkarr
          tags: |
            type=ref,event=branch,enable=${{ github.ref == 'refs/heads/beta' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=beta,enable=${{ contains(github.ref_name, '-') }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: chrisrothwell/thinkarr@${{ steps.push.outputs.digest }}
          artifact-name: sbom-${{ env.APP_VERSION }}.spdx.json
          output-file: sbom-${{ env.APP_VERSION }}.spdx.json

      - name: Upload SBOM as release asset
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ env.APP_VERSION }}
          path: sbom-${{ env.APP_VERSION }}.spdx.json
          retention-days: 90
