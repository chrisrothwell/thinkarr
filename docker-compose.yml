services:
  # Beta testers: change the image tag to 'beta' and Watchtower will keep you
  # on the latest pre-release automatically.
  #   image: chrisrothwell/thinkarr:beta
  thinkarr:
    image: chrisrothwell/thinkarr:latest
    container_name: thinkarr
    environment:
      - PUID=1000 #CHANGE_TO_YOUR_UID
      - PGID=1000 #CHANGE_TO_YOUR_GID
      - TZ=UTC #CHANGE_TO_YOUR_TZ
      #- SECURE_COOKIES=true # Uncomment if running behind a reverse proxy (HTTPS)
      # ---------------------------------------------------------------------------
      # Langfuse observability (optional — remove these if not using Langfuse)
      # To use Langfuse Cloud, set LANGFUSE_SECRET_KEY and LANGFUSE_PUBLIC_KEY.
      # To use a self-hosted Langfuse instance, also set LANGFUSE_HOST.
      # ---------------------------------------------------------------------------
      #- LANGFUSE_SECRET_KEY=sk-lf-...
      #- LANGFUSE_PUBLIC_KEY=pk-lf-...
      #- LANGFUSE_HOST=https://langfuse.your-domain.com  # omit for Langfuse Cloud
    volumes:
      - ./config:/config
    ports:
      - 3000:3000/tcp
    #network_mode: plexbridge
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Self-hosted Langfuse (optional — only needed if not using Langfuse Cloud)
  # Uncomment the block below and set LANGFUSE_HOST=http://langfuse-web:3000
  # in the thinkarr service above.
  # ---------------------------------------------------------------------------
